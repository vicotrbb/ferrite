name: Feature request
description: Propose a focused capability or performance improvement
title: "feature: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What concrete inference, compatibility, or operational problem should Ferrite solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed outcome
      description: Describe observable behavior and acceptance criteria, without prescribing an implementation unless necessary.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Link relevant specifications, measurements, model artifacts, or primary sources.
