name: Dependency policy

on:
  push:
    branches: [main]
    paths:
      - "Cargo.lock"
      - "**/Cargo.toml"
      - "deny.toml"
      - ".github/workflows/security.yml"
  pull_request:
    paths:
      - "Cargo.lock"
      - "**/Cargo.toml"
      - "deny.toml"
      - ".github/workflows/security.yml"
  schedule:
    - cron: "17 8 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cargo-deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          rust-version: "1.96.1"
          arguments: --all-features --locked
